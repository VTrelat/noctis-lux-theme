name: "Build and release noctis-example PDF"

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: "Build and release"
    runs-on: "ubuntu-latest"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PDF with LuaLaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_lualatex: true

      - name: Rename PDF
        run: cp main.pdf noctis.pdf

      - name: Fetch release by tag
        id: fetch-release
        uses: pdamianik/release-tag-to-upload-url-action@v1.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: noctis-example
          token: ${{ github.token }}
        continue-on-error: true

      - name: Delete release if already existing
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          delete_release: true
          tag_name: noctis-example
          github_token: ${{ secrets.GITHUB_TOKEN }}
        if: steps.fetch-release.outcome == 'success'

      - name: Create release
        id: create-release
        uses: avakar/tag-and-release@v1
        with:
          tag_name: noctis-example
          release_name: noctis-example
          body: Prebuilt PDF of the Noctis Lux beamer theme example.
          prerelease: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PDF asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: noctis.pdf
          asset_name: noctis.pdf
          asset_content_type: application/pdf
